name: Build with Nuitka

on:
  push:
    branches: "*"
  pull_request:
    branches: "*"
  workflow_dispatch:

jobs:
  build-standalone:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
          - os: windows-11-arm
            name: windows-arm

    runs-on: ${{ matrix.os }}
    name: Nuitka Build Standalone (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v3

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true
          python-version: "3.12"

      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/AppData/Local/Nuitka/Nuitka
            ~/Library/Caches/Nuitka
            bongocat.build
          key: nuitka-${{ matrix.name }}
          restore-keys: |
            nuitka-${{ matrix.name }}

      - name: Build with Nuitka
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force bongocat.dist -ErrorAction SilentlyContinue
          uv sync --group build
          uv run poe build standalone

      - name: List dist items
        run: Get-ChildItem -Recurse -Force .\bongocat.dist
        shell: pwsh

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          path: bongocat.dist
          name: bongo-cat-standalone-${{ matrix.name }}
          retention-days: 30

  build-onefile:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: windows-x64
          - os: windows-11-arm
            name: windows-arm

    runs-on: ${{ matrix.os }}
    name: Nuitka Build Onefile (${{ matrix.name }})
    steps:
      - uses: actions/checkout@v3

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true
          python-version: "3.12"
      - name: Cache Nuitka
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/AppData/Local/Nuitka/Nuitka
            ~/Library/Caches/Nuitka
            rovr.build
          key: nuitka-${{ matrix.name }}
          restore-keys: |
            nuitka-${{ matrix.name }}

      - name: Build with Nuitka
        shell: pwsh
        run: |
          Remove-Item -Recurse -Force bongocat.dist -ErrorAction SilentlyContinue
          uv sync --group build
          uv run poe build onefile

      - name: Get Executable Hash
        run: Get-FileHash .\bongocat.exe -Algorithm SHA256
        shell: pwsh

      - name: Upload Executable
        uses: actions/upload-artifact@v4
        with:
          path: bongocat.exe
          name: bongo-cat-onefile-${{ matrix.name }}
          retention-days: 30
